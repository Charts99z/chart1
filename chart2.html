<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Var YoY % Anual por Estado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 30px 20px; }
  .card { background: #fff; border-radius: 14px; padding: 28px 28px 20px; box-shadow: 0 4px 20px rgba(0,0,0,.1); width: 100%; max-width: 1100px; }
  h1 { color: #1a3a5c; font-size: 18px; margin-bottom: 4px; }
  p { color: #888; font-size: 12px; margin-bottom: 24px; }
  .chart-wrap { position: relative; height: 620px; }
</style>
</head>
<body>
<div class="card">
  <h1>📊 Variación YoY % Total Anual por Estado — CRECELAC</h1>
  <p>Promedio anual · Solo marca CRECELAC · Ordenado alfabéticamente</p>
  <div class="chart-wrap">
    <canvas id="myChart"></canvas>
  </div>
</div>

<script>
const labels = ["AGUASCALIENTES","BAJA CALIFORNIA","BAJA CALIFORNIA SUR","CAMPECHE","CHIAPAS","CHIHUAHUA","CIUDAD DE MEXICO","COAHUILA","COLIMA","DURANGO","GUANAJUATO","GUERRERO","HIDALGO","JALISCO","MEXICO STATE","MICHOACAN","MORELOS","NAYARIT","NUEVO LEON","OAXACA","PUEBLA","QUERETARO","QUINTANA ROO","SAN LUIS POTOSI","SINALOA","SONORA","TABASCO","TAMAULIPAS","TLAXCALA","VERACRUZ","YUCATAN","ZACATECAS"];
const values = [12.28,-9.27,332.88,99.04,-68.56,-49.64,26.14,-5.66,1657.14,90.98,-12.45,113.82,389.89,-12.8,36.45,225.31,109.52,5.13,-24.37,-43.16,84.64,-14.33,111.15,12.08,34.37,21.38,266.13,-31.65,5.0,-5.42,10.35,53.26];

const colors = values.map(v => v < 0 ? 'rgba(192,57,43,0.85)' : 'rgba(39,174,96,0.85)');
const borderColors = values.map(v => v < 0 ? '#922b21' : '#1a7a3c');

const ctx = document.getElementById('myChart').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels,
    datasets: [{
      label: 'Var YoY % Anual',
      data: values,
      backgroundColor: colors,
      borderColor: borderColors,
      borderWidth: 1.5,
      borderRadius: 4,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => `${ctx.parsed.y > 0 ? '+' : ''}${ctx.parsed.y.toFixed(2)}%`
        }
      }
    },
    scales: {
      x: {
        ticks: { font: { size: 10 }, maxRotation: 90, minRotation: 90 },
        grid: { display: false }
      },
      y: {
        grid: { color: '#eee' },
        ticks: { callback: v => (v > 0 ? '+' : '') + v + '%', font: { size: 11 } },
        title: { display: true, text: 'Var YoY % Promedio Anual', font: { size: 13 }, color: '#1a3a5c' }
      }
    }
  }
});
</script>
</body>
</html>
